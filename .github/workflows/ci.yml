name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cyberguard_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements-dev.txt

      - run: pip install -r requirements-dev.txt

      - run: python -m pytest -v
        env:
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5433/cyberguard_test

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - run: npm run test

      - run: npm run build

      # Known pre-existing type error in src/components/ui/chart.tsx (shadcn
      # boilerplate, unrelated recharts version mismatch) — informational
      # only, not a merge gate. See project memory / README for context.
      - run: npx tsc --noEmit -p tsconfig.app.json
        continue-on-error: true
